name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pruefen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff pytest fastapi httpx python-multipart

      - name: Lint
        run: ruff check .

      - name: Syntax
        run: python -m compileall -q agent.py config.py convert.py rag.py evaluation web

      - name: Tests
        run: python -m pytest -q tests
